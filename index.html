        <div class="memoIcon">🔗</div>
        <div class="memoText sourceText">
          <b>${esc(s.title||'사이트명 없음')}</b>

          ${s.memo?`<p>${esc(s.memo)}</p>`:''}

      </button>`).join('')||'<p class="muted">저장된 소싱처가 없어요.</p>'}

function editSource(id){
  if(!biz().sources) biz().sources=[];
  if(!biz().sourceCategories) biz().sourceCategories=['식기','잡화','리빙'];

  const s=id?biz().sources.find(x=>x.id===id):{
    title:'',
    cat:biz().sourceCat==='전체'?biz().sourceCategories[0]:biz().sourceCat,
    url:'',
    memo:'',
    date:today()
  };

  if(id&&!s)return;

  openModal(id?'소싱처 수정':'소싱처 추가',
  `<label>카테고리<select class="select" id="sCat">
    ${biz().sourceCategories.map(c=>`<option ${s.cat===c?'selected':''}>${esc(c)}</option>`).join('')}
  </select></label>
  <label>사이트명<input class="input" id="sTitle" value="${esc(s.title||'')}" placeholder="예: 1688 식기 공장"></label>
  <label>사이트 주소<input class="input" id="sUrl" value="${esc(s.url||'')}" placeholder="https://"></label>
  <label>메모<textarea class="textarea" id="sMemo" placeholder="가격, MOQ, 배송, 주의사항 등">${esc(s.memo||'')}</textarea></label>
  <div class="modalBtns">
    ${id?'<button class="dangerBtn" id="delSource">삭제</button>':''}
    <button class="cancel" id="cancelM">취소</button>
    <button class="ok" id="saveSource">저장</button>
  </div>`);

  $('#cancelM').onclick=closeModal;

  $('#saveSource').onclick=()=>{
    const value={
      title:$('#sTitle').value.trim()||'소싱처',
      cat:$('#sCat').value,
      url:$('#sUrl').value.trim(),
      memo:$('#sMemo').value.trim(),
      date:today()
    };

    if(id) Object.assign(s,value);
    else biz().sources.push({id:uid(),...value});

    closeModal();
    save();
    render();
  };

  if(id){
    $('#delSource').onclick=()=>{
      biz().sources=biz().sources.filter(x=>x.id!==id);
      closeModal();
      save();
      render();
    };
  }
}

function manageSourceCats(){
  if(!biz().sourceCategories) biz().sourceCategories=['식기','잡화','리빙'];
  if(!biz().sources) biz().sources=[];
  const cats=biz().sourceCategories;

  openModal('소싱처 카테고리 관리',
  `<label>새 카테고리<input class="input" id="newSourceCat" placeholder="예: 패션잡화"></label>
  <button class="ok" style="width:100%;margin-top:10px;padding:13px;border-radius:16px" id="addSourceCat">추가</button>

  <div class="miniList">
    ${cats.map(c=>`<div class="miniItem">
      <input class="input" style="margin:0" value="${esc(c)}" data-source-cat-input="${esc(c)}">
      <button data-del-source-cat="${esc(c)}">삭제</button>
    </div>`).join('')}
  </div>

  <div class="modalBtns">
    <button class="cancel" id="cancelM">닫기</button>
    <button class="ok" id="saveSourceCats">수정 저장</button>
  </div>`);

  $('#cancelM').onclick=closeModal;

  $('#addSourceCat').onclick=()=>{
    const v=$('#newSourceCat').value.trim();
    if(v&&!cats.includes(v)) cats.push(v);
    save();
    closeModal();
    manageSourceCats();
  };

  $$('[data-del-source-cat]').forEach(b=>b.onclick=()=>{
    const target=b.dataset.delSourceCat;
    biz().sourceCategories=cats.filter(c=>c!==target);
    if(!biz().sourceCategories.length) biz().sourceCategories=['식기'];
    biz().sources.forEach(s=>{
      if(s.cat===target) s.cat=biz().sourceCategories[0];
    });
    if(biz().sourceCat===target) biz().sourceCat='전체';
    save();
    closeModal();
    manageSourceCats();
  });

  $('#saveSourceCats').onclick=()=>{
    const old=[...cats];
    const next=$$('[data-source-cat-input]').map(i=>i.value.trim()).filter(Boolean);
    biz().sourceCategories=next.length?next:['식기'];

    biz().sources.forEach(s=>{
      const idx=old.indexOf(s.cat);
      if(idx>=0) s.cat=biz().sourceCategories[idx]||biz().sourceCategories[0];
    });

    closeModal();
    save();
    render();
  };

function downloadBackup(){
  const data=JSON.stringify(state,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='seo-company-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function restoreBackup(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const restored=JSON.parse(e.target.result);
      if(!confirm('백업 파일로 현재 데이터를 복원할까요? 현재 데이터는 덮어쓰기 됩니다.'))return;
      state=mergeDefaults(restored);
      forceSaveNow();
      render();
      alert('복원 완료!');
    }catch(err){
      alert('백업 파일을 읽을 수 없어요.');
    }
  };
  reader.readAsText(file);
}

    select.innerHTML=selectedGoal.months.slice().sort((a,b)=>String(a.month).localeCompare(String(b.month))).map(m=>`
      <option value="${m.id}">
        ${esc(m.month)} · ${esc(m.title||'월 목표')}
      </option>
    `).join('');
  };

  $('#saveTodo').onclick=()=>{
    const selectedGoal=goals().find(g=>g.id===$('#tGoal').value);

    if(!selectedGoal){
      alert('목표카드를 선택해주세요.');
      return;
    }

    if(!selectedGoal.months || !selectedGoal.months.length){
      alert('선택한 목표카드에 월 목표가 없습니다. 먼저 월 목표를 만들어주세요.');
      return;
    }

    const selectedMonth=selectedGoal.months.find(m=>m.id===$('#tMonth').value);

    if(!selectedMonth){
      alert('월 목표를 선택해주세요.');
      return;
    }

    const value={
      text:$('#tText').value||'투두',
      date:$('#tDate').value||'',
      owner:$('#tOwner').value||state.user
    };

    if(id && f){
      Object.assign(f.t,value);

      if(f.m.id!==selectedMonth.id){
        f.m.todos=f.m.todos.filter(x=>x.id!==id);
        if(!selectedMonth.todos) selectedMonth.todos=[];
        selectedMonth.todos.push(f.t);
      }
    }else{
      if(!selectedMonth.todos) selectedMonth.todos=[];
      selectedMonth.todos.push(newTodo(value.text,value.date,value.owner));
    }

    biz().selectedGoal=selectedGoal.id;
    biz().selectedMonth=selectedMonth.month;

    closeModal();
    save();
    render();
  };

  if(id && f){
    $('#delTodo').onclick=()=>{
  confirmDelete(
    '투두 삭제',
    '이 투두를 삭제할까요?',
    ()=>{
      f.m.todos=f.m.todos.filter(x=>x.id!==id);
      save();
      render();
    }
  );
};
  
  }
}
  function manageMemoCats(){const cats=biz().memoCategories||[];openModal('메모 카테고리 관리',`<label>새 카테고리<input class="input" id="newCat" placeholder="예: 거래처"></label><button class="ok" style="width:100%;margin-top:10px;padding:13px;border-radius:16px" id="addCat">추가</button><div class="miniList">${cats.map(c=>`<div class="miniItem"><input class="input" style="margin:0" value="${esc(c)}" data-cat-input="${esc(c)}"><button data-del-cat="${esc(c)}">삭제</button></div>`).join('')}</div><div class="modalBtns"><button class="cancel" id="cancelM">닫기</button><button class="ok" id="saveCats">수정 저장</button></div>`);$('#cancelM').onclick=closeModal;$('#addCat').onclick=()=>{const v=$('#newCat').value.trim();if(v&&!cats.includes(v))cats.push(v);closeModal();manageMemoCats();render()};$$('[data-del-cat]').forEach(b=>b.onclick=()=>{biz().memoCategories=cats.filter(c=>c!==b.dataset.delCat);biz().memos.forEach(m=>{if(m.cat===b.dataset.delCat)m.cat='업무'});closeModal();manageMemoCats();render()});$('#saveCats').onclick=()=>{const old=[...cats];biz().memoCategories=$$('[data-cat-input]').map(i=>i.value.trim()).filter(Boolean);biz().memos.forEach(m=>{const idx=old.indexOf(m.cat);if(idx>=0)m.cat=biz().memoCategories[idx]||'업무'});closeModal();render()}}
function viewMemo(id){const m=biz().memos.find(x=>x.id===id);if(!m)return;const owner=m.owner||m.author||'서';if(owner!==state.user){openModal('개인 메모',`<p class="muted">작성한 사람만 볼 수 있는 메모예요.</p><div class="modalBtns"><button class="cancel" id="cancelM">닫기</button></div>`);$('#cancelM').onclick=closeModal;return}openModal('메모 보기',`<div class="memoDetailBox"><h4>${esc(m.title||'메모')}</h4><small>${esc(m.cat||'업무')} · ${esc(m.date||today())} · ${esc(owner)}</small><p>${esc(m.text||'')}</p></div><div class="modalBtns"><button class="cancel" id="cancelM">닫기</button><button class="ok" id="editMemoBtn">수정</button></div>`);$('#cancelM').onclick=closeModal;$('#editMemoBtn').onclick=()=>editMemo(id)}
function editMemo(id){const m=id?biz().memos.find(x=>x.id===id):{cat:(biz().memoCategories||['업무'])[0],title:'',text:'',star:false,date:today(),owner:state.user};if(id && (m.owner||m.author||'서')!==state.user){viewMemo(id);return}openModal(id?'메모 수정':'메모 추가',`<label>카테고리<select class="select" id="mCat">${(biz().memoCategories||[]).map(c=>`<option ${m.cat===c?'selected':''}>${esc(c)}</option>`).join('')}</select></label><label>제목<input class="input" id="mTitle" value="${esc(m.title||'')}"></label><label>내용<textarea class="textarea" id="mText">${esc(m.text||'')}</textarea></label><label style="display:flex;gap:8px;margin-top:10px"><input type="checkbox" id="mStar" ${m.star?'checked':''}> 중요 표시</label><div class="modalBtns">${id?'<button class="dangerBtn" id="delMemo">삭제</button>':''}<button class="cancel" id="cancelM">취소</button><button class="ok" id="saveMemo">저장</button></div>`);$('#cancelM').onclick=closeModal;$('#saveMemo').onclick=()=>{if(id){Object.assign(m,{cat:$('#mCat').value,title:$('#mTitle').value||'메모',text:$('#mText').value,star:$('#mStar').checked,owner:m.owner||m.author||state.user})}else{biz().memos.push({id:uid(),cat:$('#mCat').value,title:$('#mTitle').value||'메모',text:$('#mText').value,star:$('#mStar').checked,date:today(),owner:state.user})}closeModal();render()}; if(id)$('#delMemo').onclick=()=>{biz().memos=biz().memos.filter(x=>x.id!==id);closeModal();render()}}
function editNotice(id){const n=id?notices().find(x=>x.id===id):{title:'',text:'',date:today(),author:state.user};openModal(id?'공지 수정':'공지 추가',`<label>제목<input class="input" id="nTitle" value="${esc(n.title||'')}"></label><label>내용<textarea class="textarea" id="nText">${esc(n.text||'')}</textarea></label><div class="modalBtns">${id?'<button class="dangerBtn" id="delNotice">삭제</button>':''}<button class="cancel" id="cancelM">취소</button><button class="ok" id="saveNotice">저장</button></div>`);$('#cancelM').onclick=closeModal;$('#saveNotice').onclick=()=>{if(id){Object.assign(n,{title:$('#nTitle').value||'공지',text:$('#nText').value,date:today(),author:state.user})}else{notices().push({id:uid(),title:$('#nTitle').value||'공지',text:$('#nText').value,date:today(),author:state.user})}closeModal();render()}; if(id)$('#delNotice').onclick=()=>{biz().notices=notices().filter(x=>x.id!==id);closeModal();render()}}
function editRecord(id){const r=id?biz().records.find(x=>x.id===id):{type:'income',title:'',amount:0,date:today(),cat:'',memo:''};openModal(id?'내역 수정':'내역 추가',`<label>구분<select class="select" id="rType"><option value="income" ${r.type==='income'?'selected':''}>수입</option><option value="expense" ${r.type==='expense'?'selected':''}>지출</option></select></label><label>제목<input class="input" id="rTitle" value="${esc(r.title||'')}"></label><label>금액<input class="input" id="rAmount" type="number" value="${r.amount||0}"></label><label>날짜<input class="input" id="rDate" type="date" value="${esc(r.date||today())}"></label><label>카테고리<input class="input" id="rCat" value="${esc(r.cat||'')}"></label><label>메모<textarea class="textarea" id="rMemo" placeholder="거래 관련 메모를 적어두세요.">${esc(r.memo||'')}</textarea></label><div class="modalBtns">${id?'<button class="dangerBtn" id="delRecord">삭제</button>':''}<button class="cancel" id="cancelM">취소</button><button class="ok" id="saveRecord">저장</button></div>`);$('#cancelM').onclick=closeModal;$('#saveRecord').onclick=()=>{const val={type:$('#rType').value,title:$('#rTitle').value||'내역',amount:Number($('#rAmount').value||0),date:$('#rDate').value,cat:$('#rCat').value,memo:$('#rMemo').value}; if(id)Object.assign(r,val);else biz().records.push({id:uid(),...val});closeModal();render()}; if(id)$('#delRecord').onclick=()=>{biz().records=biz().records.filter(x=>x.id!==id);closeModal();render()}}
function bindGlobal(){ $('#startBtn').onclick=()=>{state.started=true;$('#login').classList.add('hidden');$('#app').classList.remove('hidden');render()}; $('#logoutBtn').onclick=()=>{state.started=false;$('#app').classList.add('hidden');$('#login').classList.remove('hidden');save()}; $('#modalClose').onclick=closeModal; $('#modalBg').onclick=e=>{

};

bindGlobal(); if(state.started){$('#login').classList.add('hidden');$('#app').classList.remove('hidden')} render(); initFirebaseSync();
